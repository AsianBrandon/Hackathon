<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>냉동공조 — 기계공학 학습 포털</title>
  <script>(function(){document.documentElement.dataset.theme=localStorage.getItem('theme')||'dark';})();</script>
  <style>
    :root {
      --bg: #0f1117;
      --bg-card: #141920;
      --border: #1e2a3a;
      --border-subtle: #1a2133;
      --text: #e8eaf0;
      --text-muted: #8892a4;
      --text-dim: #6b7280;
      --nav-link: #6b7280;
      --chip-bg: #181d27;
      --chip-border: #252d3d;
      --chip-text: #9ca3af;
      --btn-bg: #1e2a3a;
    }
    html[data-theme="light"] {
      --bg: #f5f7fa;
      --bg-card: #ffffff;
      --border: #e2e8f0;
      --border-subtle: #e2e8f0;
      --text: #1e2330;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --nav-link: #64748b;
      --chip-bg: #f1f5f9;
      --chip-border: #e2e8f0;
      --chip-text: #64748b;
      --btn-bg: #f1f5f9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background .25s, color .25s;
    }

    nav {
      padding: 20px 40px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    nav a { color: var(--nav-link); text-decoration: none; font-size: 14px; transition: color .2s; }
    nav a:hover { color: var(--text); }
    nav .sep { color: var(--border); }
    nav .current { color: #60a5fa; font-weight: 600; }

    #theme-btn {
      margin-left: auto;
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      transition: background .2s;
    }
    #theme-btn:hover { opacity: .8; }

    .hero {
      padding: 60px 40px 48px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }
    .hero .badge {
      display: inline-block;
      background: rgba(59,130,246,.12);
      border: 1px solid rgba(59,130,246,.3);
      color: #60a5fa;
      font-size: 12px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 5px 16px; border-radius: 20px; margin-bottom: 20px;
    }
    .hero h1 {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800; margin-bottom: 14px;
      background: linear-gradient(135deg, var(--text) 40%, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p { color: var(--text-muted); font-size: 15px; line-height: 1.75; max-width: 560px; }

    .coming-soon {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px 40px 80px;
      text-align: center;
    }
    .coming-soon .icon {
      width: 80px; height: 80px;
      background: rgba(59,130,246,.1);
      border: 1px solid rgba(59,130,246,.2);
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
    }
    .coming-soon .icon svg { width: 38px; height: 38px; color: #60a5fa; }
    .coming-soon p { color: var(--text-dim); font-size: 14px; line-height: 1.7; max-width: 360px; }

    .topic-preview {
      display: flex; flex-wrap: wrap; gap: 10px;
      margin-top: 36px; justify-content: center; max-width: 600px;
    }
    .topic-chip {
      background: var(--chip-bg);
      border: 1px solid var(--chip-border);
      color: var(--chip-text);
      font-size: 12px; padding: 6px 14px; border-radius: 20px;
    }

    footer {
      text-align: center; padding: 24px;
      color: var(--text-dim); font-size: 13px;
      border-top: 1px solid var(--border-subtle);
    }
  </style>
</head>
<body>

  <nav>
    <a href="../index.html">홈</a>
    <span class="sep">›</span>
    <span class="current">냉동공조</span>
    <button id="theme-btn" onclick="toggleTheme()" title="테마 전환"><span id="ti"></span></button>
  </nav>

  <div class="hero">
    <div class="badge">Refrigeration &amp; Air Conditioning</div>
    <h1>냉동공조</h1>
    <p>냉동 사이클의 원리부터 공조 시스템 설계까지, 핵심 개념과 예제 풀이를 단계별로 학습합니다. 수치를 직접 바꿔보며 결과가 어떻게 달라지는지 시각화로 확인하세요.</p>
  </div>

  <div class="coming-soon">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="2" x2="12" y2="22"/>
        <path d="M17 7l-5 5-5-5"/><path d="M17 17l-5-5-5 5"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
      </svg>
    </div>

    <div class="topic-preview" style="margin-top:0; margin-bottom:32px; gap:12px;">
      <a href="shr.html" style="
        display:inline-block;
        background:rgba(59,130,246,.15);
        border:1px solid rgba(59,130,246,.4);
        color:#60a5fa;
        font-size:13px; font-weight:600;
        padding:10px 22px; border-radius:10px;
        text-decoration:none; transition:background .2s;
      ">SHR &amp; 질량 유량 계산 →</a>
      <a href="friction-factor.html" style="
        display:inline-block;
        background:rgba(59,130,246,.15);
        border:1px solid rgba(59,130,246,.4);
        color:#60a5fa;
        font-size:13px; font-weight:600;
        padding:10px 22px; border-radius:10px;
        text-decoration:none; transition:background .2s;
      ">압력강하 계산 →</a>
    </div>

    <p style="color:var(--text-dim); font-size:13px;">추가 예제 준비 중...</p>

    <div class="topic-preview">
      <span class="topic-chip">냉동 사이클 기초</span>
      <span class="topic-chip">증발기 · 응축기</span>
      <span class="topic-chip">COP 계산</span>
      <span class="topic-chip">p-h 선도</span>
      <span class="topic-chip">냉매 종류 및 특성</span>
      <span class="topic-chip">팽창밸브</span>
      <span class="topic-chip">냉동 부하 계산</span>
      <span class="topic-chip">공조 시스템 설계</span>
    </div>
  </div>

  <footer>&copy; 2026 기계공학 학습 포털</footer>

  <script>
    function toggleTheme() {
      var next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('theme', next);
      document.getElementById('ti').textContent = next === 'dark' ? '☀️' : '🌙';
    }
    document.getElementById('ti').textContent = (document.documentElement.dataset.theme === 'dark') ? '☀️' : '🌙';
  </script>
</body>
</html>
