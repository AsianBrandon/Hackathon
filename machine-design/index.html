<!DOCTYPE html>
<html lang="ko">
<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #0f1117;
      color: #e8eaf0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      padding: 20px 40px;
      border-bottom: 1px solid #1a2133;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    nav a {
      color: #6b7280;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    nav a:hover { color: #e8eaf0; }
    nav .sep { color: #374151; }
    nav .current { color: #fb923c; font-weight: 600; }

    .hero {
      padding: 60px 40px 48px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .hero .badge {
      display: inline-block;
      background: rgba(249, 115, 22, 0.12);
      border: 1px solid rgba(249, 115, 22, 0.3);
      color: #fb923c;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 16px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .hero h1 {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      margin-bottom: 14px;
      background: linear-gradient(135deg, #e8eaf0 40%, #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      color: #8892a4;
      font-size: 15px;
      line-height: 1.75;
      max-width: 560px;
    }

    .coming-soon {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 40px 80px;
      text-align: center;
    }

    .coming-soon .icon {
      width: 80px;
      height: 80px;
      background: rgba(249, 115, 22, 0.1);
      border: 1px solid rgba(249, 115, 22, 0.2);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }

    .coming-soon .icon svg {
      width: 38px;
      height: 38px;
      color: #fb923c;
    }

    .coming-soon h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #d1d5db;
    }

    .coming-soon p {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.7;
      max-width: 360px;
    }

    .topic-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 36px;
      justify-content: center;
      max-width: 600px;
    }

    .topic-chip {
      background: #181d27;
      border: 1px solid #252d3d;
      color: #9ca3af;
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 20px;
    }

    footer {
      text-align: center;
      padding: 24px;
      color: #374151;
      font-size: 13px;
      border-top: 1px solid #1a2133;
    }
  </style>
</head>
<body>

  <nav>

    <div class="topic-preview">

      <span class="topic-chip">안전계수</span>
      <span class="topic-chip">피로 설계</span>

      <span class="topic-chip">베어링 선정</span>

  </div>

  <footer>
    &copy; 2026 기계공학 학습 포털

</html>
